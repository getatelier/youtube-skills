repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/python -m mypy
        language: system
        types: [python]
        files: ^skills/claude-youtube/execution/
        pass_filenames: false
        args: [skills/claude-youtube/execution]

      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
